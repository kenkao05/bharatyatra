<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Admin Login</title>
<style>
/* --- Global Reset --- */
* {
  margin: 0; padding: 0; box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, sans-serif;
}

/* --- Simple Background --- */
body {
  background: #1a1a1a; /* Dark gray solid background */
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* --- Glass Card --- */
.login-container {
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 40px;
  width: 320px;
  color: #fff;
  box-shadow: 0 8px 32px rgba(31,38,135,0.37);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.18);
  text-align: center;
  animation: fadeIn 1.5s ease;
}
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

/* --- Title --- */
.login-container h2 {
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* --- Inputs --- */
.login-container input {
  width: 100%;
  padding: 10px 15px;
  margin: 10px 0;
  border: none;
  border-radius: 10px;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: #fff;
}
.login-container input::placeholder {
  color: #ddd;
}

/* --- Button --- */
.login-container button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg,#ff7e5f,#feb47b);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  transition: transform 0.2s;
}
.login-container button:hover {
  transform: scale(1.05);
}

/* Verification modal */
#verifyBox {
  display: none;
  margin-top: 15px;
}
#verifyBox input {
  background: rgba(255,255,255,0.25);
  text-align: center;
}
</style>
</head>
<body>

<div class="login-container">
  <h2>Travel Admin</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Admin Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <!-- Second factor section -->
  <div id="verifyBox">
    <p>Enter Verification Code</p>
    <input type="text" id="verifyCode" maxlength="6" placeholder="6-digit code">
    <button onclick="verifyCode()">Verify</button>
  </div>
</div>

<script>
/* --- Simple admin credentials --- */
const ADMIN_USER = "admin";
const ADMIN_PASS = "travel@123";
let generatedCode = "";

/* --- Login form submit --- */
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if(user === ADMIN_USER && pass === ADMIN_PASS){
      generatedCode = Math.floor(100000 + Math.random()*900000).toString();
      alert("Your verification code is: " + generatedCode + "\n(For demo purposes)");
      document.getElementById("verifyBox").style.display = "block";
  } else {
      alert("Invalid username or password!");
  }
});

/* --- Verify code --- */
function verifyCode(){
  const code = document.getElementById("verifyCode").value.trim();
  if(code === generatedCode){
     alert("✅ Login successful! Welcome Admin.");
     // window.location.href = "admin-dashboard.html";
  } else {
     alert("❌ Incorrect code. Try again.");
  }
}
</script>
</body>
</html>
