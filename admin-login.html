<!-- admin-login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bhart Yatra – Admin Login</title>
  <link rel="stylesheet" href="bhart.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('Gemini_Generated_Image_vgbsatvgbsatvgbs[1].png') no-repeat center center;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.85);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 40px 32px 32px 32px;
      max-width: 350px;
      width: 100%;
      text-align: center;
      position: relative;
    }
    .login-card h2 {
      margin-bottom: 24px;
      font-size: 1.5em;
      font-weight: 600;
    }
    .login-card label {
      display: block;
      text-align: left;
      font-weight: 500;
      margin-bottom: 6px;
      margin-top: 18px;
    }
    .login-card input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 12px;
      font-size: 1em;
      background: #f7f7f7;
      box-sizing: border-box;
    }
    .login-card button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, #3a8dde 0%, #1e62d0 100%);
      color: #fff;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: background 0.2s;
    }
    .login-card button:hover {
      background: linear-gradient(90deg, #1e62d0 0%, #3a8dde 100%);
    }
    .login-card .forgot {
      display: block;
      margin-top: 18px;
      font-size: 0.98em;
      color: #1e62d0;
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-card .forgot:hover {
      color: #3a8dde;
      text-decoration: underline;
    }
    .login-logo {
      font-size: 2em;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-logo .plane {
      font-size: 1.2em;
      transform: rotate(15deg);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      Bhart Yatra <span class="plane">&#9992;</span>
    </div>
    <h2>Login to Your Account</h2>
    <form onsubmit="return validateLogin()">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Username" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
      <div class="error" id="errorMsg"></div>
    </form>
    <a href="#" class="forgot">Forgot Password?</a>
  </div>

  <script>
    function validateLogin() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      if (user === 'admin' && pass === 'admin123') {
        window.location.href = 'admin-dashboard.html';
        return false;
      } else {
        document.getElementById('errorMsg').innerText = 'Incorrect username or password.';
        return false;
      }
    }
  </script>
</body>
</html>
